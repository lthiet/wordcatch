<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WordCatch</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #fafafa;
            --border: #e5e5e5;
            --border-hover: #d0d0d0;
            --text: #1a1a1a;
            --text-2: #555;
            --text-3: #999;
            --accent: #1a1a1a;
            --highlight: rgba(255, 220, 40, 0.35);
            --highlight-strong: rgba(255, 200, 0, 0.55);
            --link: #5046e5;
            --link-light: rgba(80, 70, 229, 0.08);
            --link-border: rgba(80, 70, 229, 0.4);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Top bar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 1.25rem;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .topbar h1 {
            font-size: 0.95rem;
            font-weight: 700;
            flex: 1;
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }

        .topbar .count {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-3);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            flex-shrink: 0;
            transition: border-color 0.15s;
        }

        .icon-btn:hover { border-color: var(--border-hover); }
        .icon-btn:active { background: var(--surface); }

        /* ── URL bar ── */
        .url-bar {
            display: none;
            padding: 0.6rem 1.25rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            gap: 0.5rem;
            align-items: center;
        }

        .url-bar.visible { display: flex; }

        .url-bar input {
            flex: 1;
            padding: 0.5rem 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
        }

        .url-bar input:focus { outline: none; border-color: var(--text-3); }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            letter-spacing: -0.01em;
            transition: all 0.15s;
        }

        .btn:hover { border-color: var(--border-hover); }
        .btn:active { background: var(--surface); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-primary:hover { opacity: 0.85; }
        .btn-primary:active { opacity: 0.75; }

        /* ── Content ── */
        .content {
            padding: 1.25rem;
            padding-bottom: calc(80px + var(--safe-bottom));
        }

        /* ── Landing ── */
        .landing { padding: 3rem 0 1rem; }

        .landing h2 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.15;
            margin-bottom: 0.5rem;
        }

        .landing p {
            color: var(--text-2);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .landing-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }

        .landing-btn {
            flex: 1;
            padding: 0.85rem 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }

        .landing-btn:hover { border-color: var(--border-hover); }
        .landing-btn:active { background: var(--surface); }

        .landing-btn .label { font-weight: 600; font-size: 0.85rem; }
        .landing-btn .desc { font-size: 0.72rem; color: var(--text-3); margin-top: 0.2rem; }

        /* ── Paste ── */
        .paste-screen { display: none; }

        .paste-area {
            width: 100%;
            min-height: 180px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            line-height: 1.6;
            resize: vertical;
            margin-bottom: 0.75rem;
        }

        .paste-area:focus { outline: none; border-color: var(--text-3); }
        .paste-area::placeholder { color: var(--text-3); }

        .paste-actions { display: flex; gap: 0.5rem; }

        /* ── Article ── */
        .article {
            display: none;
            font-size: 1rem;
            line-height: 1.85;
            letter-spacing: -0.005em;
        }

        .article-hero {
            width: 100%;
            margin-bottom: 1.25rem;
            border-radius: 8px;
            max-height: 240px;
            object-fit: cover;
            display: block;
        }

        .article h2 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.25;
            margin-bottom: 1rem;
        }

        .article p { margin-bottom: 0.25rem; }

        .article .w {
            display: inline;
            padding: 1px 1px;
            border-radius: 2px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .article .w:active { background: var(--surface); }

        .article .w.hl { background: rgba(255, 220, 40, 0.35); }

        .article .w.sel {
            background: rgba(80, 70, 229, 0.12);
        }

        .article .w.phrase-on {
            background: var(--link-light);
            border-bottom: 1.5px solid var(--link-border);
        }

        .article .w.phrase-off {
            opacity: 0.35;
        }

        /* ── Bottom bar ── */
        .bottombar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 0.5rem 1rem;
            padding-bottom: calc(0.5rem + var(--safe-bottom));
            display: flex;
            gap: 0.4rem;
        }

        .bottombar .btn { flex: 1; text-align: center; padding: 0.6rem 0.4rem; }



        /* ── Phrase refine bar ── */
        .phrase-bar {
            position: fixed;
            bottom: calc(52px + var(--safe-bottom));
            left: 0.75rem;
            right: 0.75rem;
            z-index: 35;
            background: var(--bg);
            border: 1px solid var(--link-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .phrase-bar.visible { display: flex; }

        .phrase-bar-label { font-size: 0.75rem; color: var(--text-3); }

        .phrase-bar-words {
            font-size: 1rem;
            font-weight: 600;
            color: var(--link);
            min-height: 1.4em;
            line-height: 1.5;
        }

        .phrase-bar-words:empty::before {
            content: 'Tap words to select...';
            color: var(--text-3);
            font-weight: 400;
            font-size: 0.85rem;
        }

        .phrase-bar-actions { display: flex; gap: 0.4rem; }
        .phrase-bar-actions .btn { flex: 1; text-align: center; }

        .btn-link-primary {
            background: var(--link);
            border-color: var(--link);
            color: #fff;
            font-weight: 600;
        }

        /* ── Sheet ── */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.15);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .sheet-overlay.open { opacity: 1; pointer-events: auto; }

        .sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: var(--bg);
            border-radius: 14px 14px 0 0;
            max-height: 80vh;
            max-height: 80dvh;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 30px rgba(0,0,0,0.08);
        }

        .sheet.open { transform: translateY(0); }

        .sheet-handle {
            width: 32px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin: 0.6rem auto 0.4rem;
        }

        .sheet-header {
            padding: 0.4rem 1.25rem 0.6rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .sheet-header h2 {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .sheet-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.25rem 0.5rem;
        }

        .sheet-empty {
            padding: 2.5rem 1rem;
            text-align: center;
            color: var(--text-3);
            font-size: 0.85rem;
        }

        .sheet-footer {
            padding: 0.6rem 1rem;
            padding-bottom: calc(0.6rem + var(--safe-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .sheet-footer .btn { flex: 1; text-align: center; }

        .word-item {
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
        }

        .word-item:active { background: var(--surface); }

        .word-item-content { flex: 1; min-width: 0; }

        .word-item-word {
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: -0.01em;
        }

        .word-item-sentence {
            font-size: 0.75rem;
            color: var(--text-3);
            line-height: 1.4;
            margin-top: 0.1rem;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .word-item .x-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-3);
            font-size: 0.9rem;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-item .x-btn:active { background: #fee; color: #c00; border-color: #c00; }


        /* ── Feed ── */
        .feed-section { text-align: left; }

        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .feed-header h3 {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-3);
        }

        .feed-tabs {
            display: flex;
            gap: 0.25rem;
            overflow-x: auto;
            padding-bottom: 0.75rem;
            -webkit-overflow-scrolling: touch;
        }

        .feed-tab {
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-3);
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            transition: all 0.15s;
        }

        .feed-tab:hover { color: var(--text); }
        .feed-tab.active {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        .feed-list {
            display: flex;
            flex-direction: column;
        }

        .feed-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            background: none;
            border-left: none;
            border-right: none;
            border-top: none;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: var(--text);
            width: 100%;
            display: flex;
            gap: 0.85rem;
            align-items: center;
            transition: opacity 0.1s;
        }

        .feed-item:first-child { border-top: 1px solid var(--border); }

        .feed-item:active { opacity: 0.6; }

        .feed-item-img {
            width: 80px;
            height: 56px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface);
        }

        .feed-item-text { flex: 1; min-width: 0; }

        .feed-item-title {
            font-size: 0.88rem;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: -0.01em;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .feed-item-meta {
            font-size: 0.7rem;
            color: var(--text-3);
            margin-top: 0.15rem;
        }

        .feed-loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-3);
            font-size: 0.85rem;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 4rem;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--accent);
            color: #fff;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: transform 0.25s ease;
            z-index: 100;
            white-space: nowrap;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Desktop ── */
        @media (min-width: 700px) {
            .content { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; padding-bottom: 100px; }
            .bottombar { max-width: 600px; left: 50%; transform: translateX(-50%); }
            .sheet { max-width: 440px; left: 50%; transform: translateX(-50%) translateY(100%); }
            .sheet.open { transform: translateX(-50%) translateY(0); }
            .phrase-bar { max-width: 600px; left: 50%; right: auto; transform: translateX(-50%); width: calc(100% - 1.5rem); }
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>WordCatch</h1>
    <span class="count" id="wordCount">0 words</span>
    <button class="btn" id="signInBtn">Sign In</button>
    <img id="userAvatar" src="" alt="" style="display:none;width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;">
    <button class="btn" id="signOutBtn" style="display:none;">Sign Out</button>
</div>

<div class="url-bar" id="urlBar">

</div>

<div class="bottombar" id="bottombar" style="display:none;">
    <button class="btn" id="bbNewArticle">New Article</button>
    <button class="btn btn-primary" id="bbWords">Words <span id="wordCount2">0</span></button>

<div class="phrase-bar" id="phraseBar">
    <div class="phrase-bar-label">Tap words above to select them for the phrase</div>
    <div class="phrase-bar-words" id="phraseWords"></div>
    <div class="phrase-bar-actions">
        <button class="btn" id="phraseCancel">Cancel</button>
        <button class="btn btn-link-primary" id="phraseSave">Save Phrase</button>
    </div>
</div>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <h2>Saved Words</h2>
        <button class="icon-btn" id="closeSheet">&times;</button>
    </div>
    <div class="sheet-body" id="sheetBody">
        <div class="sheet-empty" id="sheetEmpty">Tap words in the article to save them here.</div>
    </div>
    <div class="sheet-footer">
        <button class="btn btn-primary" id="sendToLangWizBtn">Send to lang-wiz</button>
        <button class="btn" id="downloadCsvBtn">Download CSV</button>
    </div>
</div>


<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyCjFSCgqRqHIae23iy72-E7hJy9c-ktsls",
    authDomain: "iron-log-3c398.firebaseapp.com",

});
const googleProvider = new firebase.auth.GoogleAuthProvider();

// CORS proxy strategies: each returns { fetchUrl, extract(response) -> text }
const CORS_PROXIES = [
    url => ({
        fetchUrl: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        extract: resp => resp.text(),
    }),
    url => ({
        fetchUrl: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        extract: resp => resp.json().then(j => j.contents),
    }),
    url => ({
        fetchUrl: `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`,
        extract: null, // special: returns parsed JSON, not XML
    }),
];

// Per-article word storage: { [articleKey]: [{word, sentence, date, wids}] }
let allArticleWords = JSON.parse(localStorage.getItem('vocabSaverArticles') || '{}');
let currentArticleKey = '';
let savedWords = []; // current article's words
let currentArticleImg = '';
let articleTitles = JSON.parse(localStorage.getItem('vocabSaverTitles') || '{}');

function articleKey(url, text) {
    // Use URL if available, otherwise hash of first 200 chars of text
    if (url) return url;
    let hash = 0;
    const s = text.slice(0, 200);
    for (let i = 0; i < s.length; i++) { hash = ((hash << 5) - hash) + s.charCodeAt(i); hash |= 0; }
    return 'text_' + Math.abs(hash);
}

function loadArticleWords(key) {
    currentArticleKey = key;
    savedWords = allArticleWords[key] || [];
}

function persistAll() {
    allArticleWords[currentArticleKey] = savedWords;
    localStorage.setItem('vocabSaverArticles', JSON.stringify(allArticleWords));
}

const $ = id => document.getElementById(id);
const landing = $('landing');
const pasteScreen = $('pasteScreen');
const article = $('article');
const urlBar = $('urlBar');
const bottombar = $('bottombar');
const sheet = $('sheet');
const sheetOverlay = $('sheetOverlay');
const sheetBody = $('sheetBody');
const sheetEmpty = $('sheetEmpty');
const toast = $('toast');

function showView(view) {
    landing.style.display = view === 'landing' ? 'block' : 'none';
    pasteScreen.style.display = view === 'paste' ? 'block' : 'none';
    article.style.display = view === 'article' ? 'block' : 'none';
    bottombar.style.display = view === 'article' ? 'flex' : 'none';
    if (view !== 'article') urlBar.classList.remove('visible');
}

$('landingUrl').addEventListener('click', () => {
    urlBar.classList.add('visible');
    $('urlInput').focus();
});

$('landingPaste').addEventListener('click', () => {
    showView('paste');
    $('pasteArea').focus();
});

$('closeUrlBar').addEventListener('click', () => urlBar.classList.remove('visible'));

$('cancelPasteBtn').addEventListener('click', () => {
    showView(article.innerHTML ? 'article' : 'landing');
});

$('goFetchBtn').addEventListener('click', fetchArticle);
$('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') fetchArticle(); });

async function fetchArticle() {
    const url = $('urlInput').value.trim();
    if (!url) return;
    showToast('Fetching article...');

    for (const proxyFn of CORS_PROXIES) {
        try {
            const proxy = proxyFn(url);
            if (proxy.extract === null) continue; // skip rss2json for article fetching
            const resp = await fetch(proxy.fetchUrl);
            if (!resp.ok) continue;
            const html = await proxy.extract(resp);
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const title = doc.querySelector('h1')?.textContent?.trim() || '';
            const selectors = ['.article-content','.content-body','article .body','article','[data-testid="article-body"]','main','.content'];
            let contentEl = null;
            for (const sel of selectors) {
                contentEl = doc.querySelector(sel);
                if (contentEl && contentEl.querySelectorAll('p').length > 1) break;
            }
            if (!contentEl) contentEl = doc.body;
            const junkPatterns = [
                /^legende:/i, /^bild:/i, /^quelle:/i,
                /box aufklappen/i, /box zuklappen/i,
                /passend zum thema/i, /mehr zum thema/i,
                /^\s*;?\s*(sda|srf|keystone|reuters|afp|ap|mcep|ats)/i,
                /^\d{1,2}\.\d{1,2}\.\d{2,4},?\s*\d{1,2}[:.]\d{2}/,
                /^(audio|video|beitrag|sendung)/i,
                /sda\/\w+\s*$/i,
                /;\s*(sda|keystone|mcep|reuters|afp|ats)/i,
            ];
            const paragraphs = Array.from(contentEl.querySelectorAll('p'))
                .map(p => p.textContent.trim())
                // Strip trailing source attributions
                .map(t => t.replace(/\s*;?\s*(sda|keystone|mcep|reuters|afp|ats)(\/\w+)?\s*$/i, '').trim())
                .filter(t => t.length > 20 && !junkPatterns.some(re => re.test(t)));
            if (paragraphs.length < 1) continue;
            const text = (title ? title + '\n\n' : '') + paragraphs.join('\n\n');
            const key = articleKey(url, text);
            loadArticleWords(key);
            if (title) { articleTitles[key] = title; localStorage.setItem('vocabSaverTitles', JSON.stringify(articleTitles)); }
            renderArticle(text);
            showToast('Article loaded!');
            return;
        } catch (e) { continue; }
    }
    showToast('Could not fetch. Try copy-pasting the text.');
}

$('renderTextBtn').addEventListener('click', () => {
    const text = $('pasteArea').value.trim();
    if (!text) return;
    currentArticleImg = '';
    loadArticleWords(articleKey('', text));
    renderArticle(text);
});

function renderArticle(text) {
    urlBar.classList.remove('visible');
    showView('article');
    const paragraphs = text.split(/\n\s*\n|\n/).filter(p => p.trim());
    article.innerHTML = '';
    let wIdx = 0;

    if (currentArticleImg) {
        const img = document.createElement('img');
        img.className = 'article-hero';
        img.src = currentArticleImg;
        img.alt = '';
        article.appendChild(img);
    }

    paragraphs.forEach((para, i) => {
        if (i === 0 && para.length < 150) {
            const h2 = document.createElement('h2');
            h2.textContent = para.trim();
            article.appendChild(h2);
            return;
        }
        const p = document.createElement('p');
        const tokens = para.trim().split(/(\s+)/);
        tokens.forEach(token => {
            if (/^\s+$/.test(token)) {
                p.appendChild(document.createTextNode(' '));
            } else if (token) {
                // Split hyphenated words into separate word spans
                const subWords = token.split(/(-)/);
                subWords.forEach(part => {
                    if (part === '-') {
                        p.appendChild(document.createTextNode('-'));
                    } else if (part) {
                        const span = document.createElement('span');
                        span.className = 'w';
                        span.textContent = part;
                        span.dataset.word = part;
                        span.dataset.wid = wIdx++;
                        p.appendChild(span);
                    }
                });
            }
        });
        article.appendChild(p);
    });
    applyHighlights();
    setupTouch();
    updateCounts();
}

// ── Phrase refine mode ──
// After hold+drag, user can tap words to toggle them on/off before saving
let phraseMode = false;
let phraseWords = []; // [{el, word, on}]

function enterPhraseMode(wordEls) {
    phraseMode = true;
    phraseWords = wordEls.map(el => ({ el, word: el.dataset.word, on: false }));
    phraseWords.forEach(pw => { pw.el.classList.add('phrase-off'); pw.el.classList.remove('sel'); });
    updatePhraseBar();
    $('phraseBar').classList.add('visible');
}

function exitPhraseMode() {
    phraseMode = false;
    phraseWords.forEach(pw => { pw.el.classList.remove('phrase-on', 'phrase-off'); });
    phraseWords = [];
    $('phraseBar').classList.remove('visible');
}

function togglePhraseWord(el) {
    const pw = phraseWords.find(p => p.el === el);
    if (!pw) return;
    pw.on = !pw.on;
    pw.el.classList.toggle('phrase-on', pw.on);
    pw.el.classList.toggle('phrase-off', !pw.on);
    updatePhraseBar();
}

function updatePhraseBar() {
    const selected = phraseWords.filter(pw => pw.on);
    if (selected.length === 0) {
        $('phraseWords').textContent = '';
        return;
    }
    const parts = [];
    let lastIdx = -2;
    selected.forEach(pw => {
        const idx = phraseWords.indexOf(pw);
        if (lastIdx >= 0 && idx > lastIdx + 1) parts.push('...');
        const w = stripPunctuation(pw.word);
        if (w) parts.push(w);
        lastIdx = idx;
    });
    $('phraseWords').textContent = parts.join(' ');
}

$('phraseCancel').addEventListener('click', exitPhraseMode);

$('phraseSave').addEventListener('click', () => {
    const selected = phraseWords.filter(pw => pw.on);
    if (selected.length === 0) { showToast('Select at least 1 word'); return; }

    let phrase;
    if (selected.length === phraseWords.length) {
        // All words selected — save as contiguous phrase
        phrase = selected.map(pw => stripPunctuation(pw.word)).filter(Boolean).join(' ');
    } else {
        // Some deselected — use ... gaps
        const parts = [];
        let lastIdx = -2;
        selected.forEach(pw => {
            const idx = phraseWords.indexOf(pw);
            if (lastIdx >= 0 && idx > lastIdx + 1) parts.push('...');
            const w = stripPunctuation(pw.word);
            if (w) parts.push(w);
            lastIdx = idx;
        });
        phrase = parts.join(' ');
    }

    const sentence = getSentence(phraseWords[0].el);
    const wids = selected.map(pw => pw.el.dataset.wid);
    addWord(phrase, sentence, wids);
    exitPhraseMode();
});

// ── Touch/click ──
let touchSetup = false;
function setupTouch() {
    if (touchSetup) return;
    touchSetup = true;
    let startW = null, curW = null, isDrag = false, moved = false;
    let holdTimer = null;
    let isHold = false;

    function wordAt(x, y) { const el = document.elementFromPoint(x, y); return el?.closest?.('.w') || null; }
    function clearSel() { article.querySelectorAll('.sel').forEach(w => w.classList.remove('sel')); }

    function hlRange(a, b) {
        const all = Array.from(article.querySelectorAll('.w'));
        const iA = all.indexOf(a), iB = all.indexOf(b);
        if (iA < 0 || iB < 0) return;
        const [f, t] = iA < iB ? [iA, iB] : [iB, iA];
        clearSel();
        for (let i = f; i <= t; i++) all[i].classList.add('sel');
    }

    function getRange(a, b) {
        const all = Array.from(article.querySelectorAll('.w'));
        const iA = all.indexOf(a), iB = all.indexOf(b);
        if (iA < 0 || iB < 0) return [];
        const [f, t] = iA < iB ? [iA, iB] : [iB, iA];
        return all.slice(f, t + 1);
    }

    function handleTap(el) {
        if (phraseMode) { togglePhraseWord(el); return; }
        const wid = el.dataset.wid;
        if (el.classList.contains('hl')) { removeWordByWids([wid]); }
        else { addWord(el.dataset.word, getSentence(el), [wid]); }
    }

    function handleDragEnd(a, b) {
        const range = getRange(a, b);
        if (range.length < 2) { handleTap(a); clearSel(); return; }
        enterPhraseMode(range);
    }

    // Unified click handler for phrase mode (works for both touch and mouse)
    article.addEventListener('click', e => {
        if (!phraseMode) return;
        const w = e.target.closest('.w');
        if (w) {
            e.preventDefault();
            e.stopPropagation();
            togglePhraseWord(w);
        }
    }, true);

    // Touch
    article.addEventListener('touchstart', e => {
        const w = e.target.closest('.w');
        if (!w) return;
        if (phraseMode) return;
        startW = w; curW = w; isDrag = false; moved = false; isHold = false;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        holdTimer = setTimeout(() => { isHold = true; w.classList.add('sel'); }, 300);
    }, { passive: true });

    let touchStartX = 0, touchStartY = 0;

    article.addEventListener('touchmove', e => {
        if (phraseMode || !startW) return;
        const touch = e.touches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        // Only count as "moved" if finger moved more than 10px
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) moved = true;
        if (!isHold) { if (moved) clearTimeout(holdTimer); return; }
        // In hold mode: prevent scrolling so user can drag-select words
        e.preventDefault();
        const w = wordAt(touch.clientX, touch.clientY);
        if (w && w !== startW) { isDrag = true; curW = w; hlRange(startW, w); }
    }, { passive: false });

    let lastTouchEnd = 0;
    article.addEventListener('touchend', e => {
        clearTimeout(holdTimer);
        if (phraseMode) return;
        if (!startW) return;
        lastTouchEnd = Date.now();
        if (isHold && isDrag && curW && curW !== startW) {
            handleDragEnd(startW, curW);
        } else if (isHold && !isDrag) {
            clearSel();
            enterPhraseMode([startW]);
        } else if (!isDrag && !moved) {
            handleTap(startW);
        }
        startW = null; curW = null; isDrag = false; moved = false; isHold = false;
    });

    // Mouse (desktop) — skip synthetic mouse events fired after touch
    let md = false;
    article.addEventListener('mousedown', e => {
        if (Date.now() - lastTouchEnd < 500) return;
        const w = e.target.closest('.w');
        if (!w) return;
        if (phraseMode) return;
        e.preventDefault();
        startW = w; curW = w; isDrag = false; md = true; isHold = false;
        holdTimer = setTimeout(() => { isHold = true; w.classList.add('sel'); }, 300);
    });

    article.addEventListener('mousemove', e => {
        if (phraseMode || !md || !startW) return;
        if (!isHold) { clearTimeout(holdTimer); return; }
        const w = e.target.closest('.w');
        if (w && w !== startW) { isDrag = true; curW = w; hlRange(startW, w); }
    });

    article.addEventListener('mouseup', e => {
        clearTimeout(holdTimer);
        if (phraseMode) return;
        if (!md) return;
        md = false;
        if (isHold && isDrag && curW && curW !== startW) {
            handleDragEnd(startW, curW);
        } else if (isHold && !isDrag) {
            clearSel();
            enterPhraseMode([startW]);
        } else if (startW) {
            handleTap(startW);
        }
        startW = null; curW = null; isDrag = false; isHold = false;
    });
}

function getSentence(el) {
    const p = el.closest('p');
    if (!p) return '';
    const text = p.textContent;
    const ss = text.match(/[^.!?]+[.!?]+/g) || [text];
    const w = el.dataset.word;
    for (const s of ss) { if (s.includes(w)) return s.trim(); }
    return text.trim();
}

function wordColor(index) {
    const hue = (index * 137.508) % 360;
    return `hsla(${Math.round(hue)}, 75%, 65%, 0.35)`;
}

function stripPunctuation(word) {
    return word.replace(/^[\p{P}\p{S}]+|[\p{P}\p{S}]+$/gu, '');
}

function addWord(word, sentence, wids) {
    word = stripPunctuation(word);
    if (!word) return;
    const alreadySaved = savedWords.some(w => w.wids && w.wids.some(id => wids.includes(id)));
    if (alreadySaved) return;
    savedWords.push({ word, sentence, date: new Date().toISOString().split('T')[0], wids });
    persistAll(); updateCounts(); renderWordList();
    applyHighlights();
    showToast(`Saved "${word}"`);
}

function removeWordByWids(wids) {
    // Find saved word that contains any of these wids
    const idx = savedWords.findIndex(w => w.wids && w.wids.some(id => wids.includes(id)));
    if (idx !== -1) { savedWords.splice(idx, 1); persistAll(); updateCounts(); renderWordList(); applyHighlights(); }
}

function applyHighlights() {
    // Clear all
    article.querySelectorAll('.w').forEach(w => {
        w.classList.remove('hl');
        w.style.backgroundColor = '';
    });
    // Apply: only highlight the exact word instances that were saved
    savedWords.forEach((sw, idx) => {
        if (!sw.wids) return;
        const color = wordColor(idx);
        sw.wids.forEach(wid => {
            const el = article.querySelector(`.w[data-wid="${wid}"]`);
            if (el) {
                el.classList.add('hl');
                el.style.backgroundColor = color;
            }
        });
    });
}



function allWords() {
    return Object.values(allArticleWords).flat();
}

function updateCounts() {
    const total = allWords().length;
    const current = savedWords.length;
    $('wordCount').textContent = current + ' word' + (current !== 1 ? 's' : '');
    $('wordCount2').textContent = current;
}

function renderWordList() {
    sheetBody.querySelectorAll('.word-item, .section-header').forEach(el => el.remove());
    sheetEmpty.style.display = savedWords.length === 0 ? 'block' : 'none';

    savedWords.forEach((entry, idx) => {
        const div = document.createElement('div');
        div.className = 'word-item';
        div.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${wordColor(idx)};flex-shrink:0;margin-top:5px;display:inline-block;"></span><div class="word-item-content"><div class="word-item-word">${escapeHtml(entry.word)}</div><div class="word-item-sentence">${escapeHtml(entry.sentence)}</div></div><button class="x-btn">&times;</button>`;
        div.querySelector('.x-btn').addEventListener('click', () => {
            savedWords.splice(idx, 1);
            persistAll(); updateCounts(); renderWordList(); applyHighlights();
        });
        sheetBody.appendChild(div);
    });
}


function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function openSheet() { renderWordList(); sheetOverlay.classList.add('open'); sheet.classList.add('open'); }
function closeSheet() { sheetOverlay.classList.remove('open'); sheet.classList.remove('open'); }

$('bbWords').addEventListener('click', openSheet);
$('closeSheet').addEventListener('click', closeSheet);
sheetOverlay.addEventListener('click', closeSheet);
$('bbNewArticle').addEventListener('click', () => { showView('landing'); $('pasteArea').value = ''; if (feedCache[currentFeed]) renderFeed(feedCache[currentFeed].items); });

function generateCSV() {
    const all = allWords();
    if (all.length === 0) return null;
    const rows = all.map(w => `"${w.word.replace(/"/g,'""')}","${w.sentence.replace(/"/g,'""')}","${w.date}"`);
    return '\uFEFFWord/Phrase,Sentence,Date\n' + rows.join('\n');
}

$('downloadCsvBtn').addEventListener('click', () => {
    const csv = generateCSV();
    if (!csv) { showToast('No words saved yet'); return; }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    a.download = `vocab-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
});

$('sendToLangWizBtn').addEventListener('click', async () => {
    const words = savedWords;
    if (words.length === 0) { showToast('No words saved for this article'); return; }

    // Ensure signed in
    let user = firebase.auth().currentUser;
    if (!user) {
        try { await firebase.auth().signInWithPopup(googleProvider); user = firebase.auth().currentUser; }
        catch { showToast('Sign-in cancelled'); return; }
    }

    showToast('Sending…');
    try {
        await firebase.firestore().collection('wordPackages').add({
            articleTitle: articleTitles[currentArticleKey] || 'Untitled',
            words: words.map(w => w.word),
            sentences: words.map(w => w.sentence),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            processed: false,
            userId: user.uid
        });
        showToast('Sent to lang-wiz!');
    } catch (err) {
        showToast('Failed to send');
    }
});

function showToast(msg) {
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 2200);
}

// RSS Feed (URLs from https://www.srf.ch/really-simple-syndication-rss-feeds-von-srf)
const SRF_FEEDS = {
    news: 'https://www.srf.ch/news/bnf/rss/19032223',
    schweiz: 'https://www.srf.ch/news/bnf/rss/1890',
    international: 'https://www.srf.ch/news/bnf/rss/1922',
    wirtschaft: 'https://www.srf.ch/news/bnf/rss/1926',
    sport: 'https://www.srf.ch/sport/bnf/rss/2562',
    kultur: 'https://www.srf.ch/kultur/bnf/rss/8726',
    wissen: 'https://www.srf.ch/bnf/rss/19919909',
};

let currentFeed = 'news';
let feedCache = {};

async function loadFeed(category) {
    currentFeed = category;
    const feedList = $('feedList');
    const loading = $('feedLoading');
    document.querySelectorAll('.feed-tab').forEach(t => t.classList.toggle('active', t.dataset.feed === category));
    if (feedCache[category] && Date.now() - feedCache[category].ts < 300000) { renderFeed(feedCache[category].items); return; }
    loading.style.display = 'block';
    loading.textContent = 'Loading articles...';
    feedList.querySelectorAll('.feed-item').forEach(el => el.remove());
    const feedUrl = SRF_FEEDS[category];
    if (!feedUrl) return;

    for (const proxyFn of CORS_PROXIES) {
        try {
            const proxy = proxyFn(feedUrl);

            // rss2json returns pre-parsed JSON
            if (proxy.extract === null) {
                const resp = await fetch(proxy.fetchUrl);
                if (!resp.ok) { console.warn(`rss2json failed (${resp.status}) for ${feedUrl}`); continue; }
                const json = await resp.json();
                if (json.status !== 'ok' || !json.items?.length) { console.warn('rss2json: no items for', feedUrl); continue; }
                const items = json.items.slice(0, 15).map(it => ({
                    title: it.title || '',
                    link: it.link || '',
                    description: (it.description || '').replace(/<[^>]*>/g, '').trim(),
                    pubDate: it.pubDate || '',
                    img: it.enclosure?.link || it.thumbnail || '',
                }));
                feedCache[category] = { items, ts: Date.now() };
                renderFeed(items);
                return;
            }

            // XML-based proxies
            const resp = await fetch(proxy.fetchUrl);
            if (!resp.ok) { console.warn(`Feed proxy failed (${resp.status}) for ${feedUrl}`); continue; }
            const xml = await proxy.extract(resp);
            const doc = new DOMParser().parseFromString(xml, 'text/xml');
            if (doc.querySelector('parsererror')) { console.warn('XML parse error for', feedUrl); continue; }
            const items = Array.from(doc.querySelectorAll('item')).slice(0, 15).map(item => {
                const desc = item.querySelector('description')?.textContent || '';
                const imgMatch = desc.match(/src="([^"]+)"/);
                let img = imgMatch ? imgMatch[1] : '';
                if (img) img = img.replace('/320ws/', '/640ws/');
                return {
                    title: item.querySelector('title')?.textContent || '',
                    link: item.querySelector('link')?.textContent?.trim() || '',
                    description: desc.replace(/<[^>]*>/g, '').trim(),
                    pubDate: item.querySelector('pubDate')?.textContent || '',
                    img,
                };
            });
            if (items.length === 0) { console.warn('No items found in feed', feedUrl); continue; }
            feedCache[category] = { items, ts: Date.now() };
            renderFeed(items);
            return;
        } catch (e) { console.warn('Feed fetch error:', e.message, feedUrl); continue; }
    }
    loading.textContent = 'Could not load feed. Try again later.';
}

function renderFeed(items) {
    const feedList = $('feedList');
    $('feedLoading').style.display = 'none';
    feedList.querySelectorAll('.feed-item').forEach(el => el.remove());
    items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'feed-item';
        const imgHtml = item.img ? `<img class="feed-item-img" src="${escapeHtml(item.img)}" alt="" loading="lazy" />` : '';
        const savedCount = allArticleWords[item.link]?.length || 0;
        const savedBadge = savedCount > 0 ? ` · <span style="color:var(--link);font-weight:600;">${savedCount} word${savedCount !== 1 ? 's' : ''} saved</span>` : '';
        btn.innerHTML = `${imgHtml}<div class="feed-item-text"><div class="feed-item-title">${escapeHtml(item.title)}</div><div class="feed-item-meta">${timeAgo(item.pubDate)}${savedBadge}</div></div>`;
        btn.addEventListener('click', () => {
            $('urlInput').value = item.link;
            currentArticleImg = item.img || '';
            showToast('Loading: ' + item.title.slice(0, 40) + '...');
            fetchArticle();
        });
        feedList.appendChild(btn);
    });
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    try {
        const d = new Date(dateStr);
        const mins = Math.floor((Date.now() - d) / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        return Math.floor(hrs / 24) + 'd ago';
    } catch (e) { return ''; }
}

document.querySelectorAll('.feed-tab').forEach(tab => {
    tab.addEventListener('click', () => loadFeed(tab.dataset.feed));
});

$('refreshFeed').addEventListener('click', () => { delete feedCache[currentFeed]; loadFeed(currentFeed); });

updateCounts();
showView('landing');
loadFeed('news');
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
